<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Japanese Grammar Tutor</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="jgtp-wrap">
    <h1>Japanese Grammar Tutor</h1>
    <p class="jgtp-hint">Paste or type a Japanese sentence, or select text on a page and press <kbd>Alt+G</kbd> (<kbd>Cmd+Shift+A</kbd> on Mac).</p>
    <textarea id="jgtp-input" rows="3" placeholder="日本語の文をここに入力"></textarea>
    <button id="jgtp-explain" type="button">Explain this sentence</button>
    <div id="jgtp-status" class="jgtp-status"></div>
    <a id="jgtp-options-link" href="#">Settings</a>
  </div>
  <script src="popup.js"></script>
</body>
</html>
